<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Extractor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1877F2,#42A5F5);
    padding:20px;
}

.box{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:18px;
    padding:25px;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
}

h2{
    text-align:center;
    color:#1877F2;
    margin-bottom:8px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:18px;
    font-size:14px;
}

textarea{
    width:100%;
    height:160px;
    border:2px solid #1877F2;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    resize:none;
    outline:none;
    transition:.3s;
}

textarea:focus{
    border-color:#0D47A1;
    box-shadow:0 0 12px rgba(24,119,242,.25);
}

/* Floating Message */

.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%) translateY(-70px);
    background:#222;
    color:#fff;
    padding:10px 18px;
    border-radius:50px;
    font-size:15px;
    font-weight:600;
    white-space:nowrap;
    opacity:0;
    transition:.35s;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    z-index:9999;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="box">
    <h2>Full SMS to OTP </h2>
    <p>Auto Copy System</p>

    <textarea id="input" placeholder="Paste any SMS here..."></textarea>
</div>

<script>

const input = document.getElementById("input");
const toast = document.getElementById("toast");

let timer;

input.addEventListener("input", async () => {

    const text = input.value;

    // সব সংখ্যা বের করবে
    const digits = text.replace(/\D/g, "");

    // প্রথম ৬টি সংখ্যা নেবে
    if (digits.length >= 6) {

        const code = digits.substring(0,6);

        try{
            await navigator.clipboard.writeText(code);
        }catch(e){}

        // বক্স খালি
        input.value = "";

        // ফ্লোটিং মেসেজ
        toast.textContent = "✅ Copied: " + code;
        toast.classList.add("show");

        clearTimeout(timer);

        timer = setTimeout(() => {
            toast.classList.remove("show");
        },3000);

    }

});

</script>

</body>
</html>
